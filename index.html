<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahayla - Meus Links</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <div class="profile-image">
                <img src="https://via.placeholder.com/120" alt="Perfil" id="profileImage">
            </div>
            <h1 class="profile-name">Mahayla</h1>
            <p class="profile-bio">Bem-vindo aos meus links! Conheça meus projetos e redes sociais.</p>
        </div>

        <!-- Links Section -->
        <div class="links-section">
            <!-- Social Links -->
            <div class="links-group">
                <h2>Redes Sociais</h2>
                <a href="https://instagram.com" class="link-button social-link" target="_blank" data-category="social">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://twitter.com" class="link-button social-link" target="_blank" data-category="social">
                    <i class="fab fa-twitter"></i>
                    <span>Twitter</span>
                </a>
                <a href="https://linkedin.com" class="link-button social-link" target="_blank" data-category="social">
                    <i class="fab fa-linkedin"></i>
                    <span>LinkedIn</span>
                </a>
                <a href="https://github.com/leticiaswit-creator" class="link-button social-link" target="_blank" data-category="social">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>

            <!-- Projects -->
            <div class="links-group">
                <h2>Meus Projetos</h2>
                <a href="#" class="link-button project-link" data-category="project">
                    <i class="fas fa-code"></i>
                    <span>Projeto 1</span>
                    <small>Descrição do projeto</small>
                </a>
                <a href="#" class="link-button project-link" data-category="project">
                    <i class="fas fa-code"></i>
                    <span>Projeto 2</span>
                    <small>Descrição do projeto</small>
                </a>
                <a href="#" class="link-button project-link" data-category="project">
                    <i class="fas fa-code"></i>
                    <span>Projeto 3</span>
                    <small>Descrição do projeto</small>
                </a>
            </div>

            <!-- Contact -->
            <div class="links-group">
                <h2>Contato</h2>
                <a href="mailto:seu-email@exemplo.com" class="link-button contact-link" data-category="contact">
                    <i class="fas fa-envelope"></i>
                    <span>Email</span>
                </a>
                <a href="https://wa.me/seu-numero" class="link-button contact-link" target="_blank" data-category="contact">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp</span>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 Mahayla. Feito com ❤️</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
